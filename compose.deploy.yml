# NoorCV — Standalone Docker Compose for Deployment
#
# Usage:
#   1. Copy this file to your server: ~/noorcv/compose.yml
#   2. Create ~/noorcv/.env with your secrets (see .env.example below)
#   3. Run: docker compose up -d
#
# .env.example:
#   APP_URL=https://noorcv.com
#   AUTH_SECRET=<openssl rand -hex 32>
#   POSTGRES_PASSWORD=<openssl rand -hex 32>
#   BROWSERLESS_TOKEN=<openssl rand -hex 16>
#   ADMIN_EMAILS=admin@example.com
#
# The app image can be:
#   - Built locally: docker compose build app
#   - Pulled from GitLab registry (set image in CI/CD)
#   - Pulled from any registry by changing the image field

name: noorcv

services:
  app:
    build: .
    # Or use a pre-built image from your registry:
    # image: registry.gitlab.com/your-group/noorcv:latest
    container_name: noorcv-app
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - TZ=${TZ:-Etc/UTC}
      - NODE_ENV=production
      - APP_URL=${APP_URL:-http://localhost:3000}
      - PRINTER_APP_URL=http://noorcv-app:3000
      - PRINTER_ENDPOINT=ws://noorcv-browserless:3000?token=${BROWSERLESS_TOKEN:-1234567890}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-noorcv}:${POSTGRES_PASSWORD:-noorcv}@noorcv-postgres:5432/${POSTGRES_DB:-noorcv}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env}
      # Social Auth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-NoorCV <noreply@noorcv.com>}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      # Admin
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      # Feature Flags
      - FLAG_DISABLE_SIGNUPS=${FLAG_DISABLE_SIGNUPS:-false}
      - FLAG_DISABLE_EMAIL_AUTH=${FLAG_DISABLE_EMAIL_AUTH:-false}
      - FLAG_DISABLE_IMAGE_PROCESSING=${FLAG_DISABLE_IMAGE_PROCESSING:-false}
    volumes:
      - noorcv_app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      browserless:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - noorcv-internal

  postgres:
    image: postgres:16-alpine
    container_name: noorcv-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-noorcv}
      - POSTGRES_USER=${POSTGRES_USER:-noorcv}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-noorcv}
    volumes:
      - noorcv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noorcv} -d ${POSTGRES_DB:-noorcv}"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - noorcv-internal

  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: noorcv-browserless
    restart: always
    environment:
      - QUEUED=10
      - HEALTH=true
      - CONCURRENT=5
      - TOKEN=${BROWSERLESS_TOKEN:-1234567890}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure?token=${BROWSERLESS_TOKEN:-1234567890}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - noorcv-internal

networks:
  noorcv-internal:
    driver: bridge

volumes:
  noorcv_app_data:
  noorcv_postgres_data:
