# NoorCV GitLab CI/CD Pipeline
# Builds Docker image and deploys to production server via SSH.
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   DEPLOY_HOST        - Server IP or hostname (e.g., 10.0.0.1 or endlessmaker.com)
#   DEPLOY_USER        - SSH user on the server (e.g., redman)
#   DEPLOY_SSH_KEY     - Private SSH key (type: File, masked)
#   REGISTRY_USER      - Docker registry username (for GitLab: $CI_REGISTRY_USER)
#   REGISTRY_PASSWORD  - Docker registry password (for GitLab: $CI_REGISTRY_PASSWORD)
#
# Optional Variables (with defaults in compose.deploy.yml):
#   APP_URL, AUTH_SECRET, POSTGRES_PASSWORD, BROWSERLESS_TOKEN,
#   ADMIN_EMAILS, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, etc.

stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ---------- Build ----------
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --pull -t "$DOCKER_IMAGE" -t "$DOCKER_IMAGE_LATEST" .
    - docker push "$DOCKER_IMAGE"
    - docker push "$DOCKER_IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------- Deploy ----------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$DEPLOY_SSH_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    # Copy compose file to server
    - scp -o StrictHostKeyChecking=no compose.deploy.yml "$DEPLOY_USER@$DEPLOY_HOST:~/noorcv/compose.yml"

    # Deploy on remote server
    - |
      ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" << 'ENDSSH'
        cd ~/noorcv

        # Login to registry and pull new image
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker compose pull app

        # Restart with zero downtime
        docker compose up -d --remove-orphans

        # Wait for health check
        echo "Waiting for app to be healthy..."
        for i in $(seq 1 30); do
          if docker compose exec app curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "App is healthy!"
            exit 0
          fi
          sleep 5
        done
        echo "Health check failed after 150s"
        docker compose logs app --tail=50
        exit 1
      ENDSSH
  environment:
    name: production
    url: $APP_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_TAG
