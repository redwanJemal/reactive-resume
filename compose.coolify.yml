# HireGulf Coolify Deployment
# Uses Traefik dynamic file config for routing (see traefik-hiregulf.yaml)

services:
  app:
    build: .
    container_name: hiregulf-app
    restart: always
    environment:
      - TZ=${TZ:-Etc/UTC}
      - NODE_ENV=production
      - APP_URL=${APP_URL:-https://resume.endlessmaker.com}
      - PRINTER_APP_URL=${PRINTER_APP_URL:-http://hiregulf-app:3000}
      - PRINTER_ENDPOINT=ws://hiregulf-browserless:3000?token=${BROWSERLESS_TOKEN:-1234567890}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hiregulf}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@hiregulf-postgres:5432/${POSTGRES_DB:-hiregulf}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET}
      # Social Auth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-HireGulf <noreply@hiregulf.com>}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      # Feature Flags
      - FLAG_DISABLE_SIGNUPS=${FLAG_DISABLE_SIGNUPS:-false}
      - FLAG_DISABLE_EMAIL_AUTH=${FLAG_DISABLE_EMAIL_AUTH:-false}
      - FLAG_DISABLE_IMAGE_PROCESSING=${FLAG_DISABLE_IMAGE_PROCESSING:-false}
    volumes:
      - hiregulf_app_data:/app/data
    labels:
      # Routing handled by Traefik dynamic file config (/traefik/dynamic/hiregulf.yaml)
      - traefik.enable=false
    depends_on:
      postgres:
        condition: service_healthy
      browserless:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hiregulf-internal
      - coolify

  postgres:
    image: postgres:16-alpine
    container_name: hiregulf-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-hiregulf}
      - POSTGRES_USER=${POSTGRES_USER:-hiregulf}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - hiregulf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiregulf} -d ${POSTGRES_DB:-hiregulf}"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hiregulf-internal
      - coolify

  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: hiregulf-browserless
    restart: always
    environment:
      - QUEUED=10
      - HEALTH=true
      - CONCURRENT=5
      - TOKEN=${BROWSERLESS_TOKEN:-1234567890}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure?token=${BROWSERLESS_TOKEN:-1234567890}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hiregulf-internal
      - coolify

networks:
  hiregulf-internal:
    driver: bridge
  coolify:
    external: true

volumes:
  hiregulf_app_data:
  hiregulf_postgres_data:
